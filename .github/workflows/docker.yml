# ─────────────────────────────────────────────────────────────────────────────
# Build, Tag & Push – Multi-arch container image to ghcr.io
#
# Triggers:  push to main  |  merged PR into main
# Platforms: linux/amd64, linux/arm64 (via QEMU emulation)
# Registry:  ghcr.io/maulik-sharma/http-server
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Push Container

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  build-and-push-server:
    # Skip unmerged PR closes
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write          # required to push to ghcr.io

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. QEMU – enable arm64 emulation ─────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Buildx – multi-platform builder ───────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Login to GitHub Container Registry ────────────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Generate image metadata (tags & labels) ──────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/http-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch

      # ── 6. Build & push multi-arch image ─────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
